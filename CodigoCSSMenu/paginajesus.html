<!DOCTYPE html>
<html>
<head>
	<title>solución ejercicio de banderas</title>

<style>

div{width:300px;height:200px;margin:20px;
	display:inline-block;
	border:1px solid #000;
}

.costarica{
	background-image:linear-gradient(blue 20%, white 20%, white 40%, red 40%, red 60%, white 60%, white 80%, blue 80%, blue 100%);
}

.venezuela{
	background-image:linear-gradient(yellow 33%, blue 33%, blue 66.66%, darkred 66.66%);
}

.rusia{
  background-image:linear-gradient(white 33%, blue 33%, blue 66.66%,
  red 66.66%);
}

.estonia{

}

.guatemala{
	background-image:linear-gradient(90deg,lightblue 33%, white 33%, white 66.66%, lightblue 66.66%);
}

.india{
	background-image:linear-gradient(orange 33%, white 33%, white 66.66%, green 66.66%);
}
</style>
</head>
<body>


  <div class="costarica">Costa Rica</div>
  <div class="venezuela">Venezuela</div>
  <div class="estonia">Estonia</div>
  <div class="guatemala">Guatemala</div>
  <div class="india">India</div>
  <div class="rusia">Rusia</div>

  
</body>
</html>
