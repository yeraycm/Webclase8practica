<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Naturaleza Viva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e8f5e9;
        }

        header {
            background: linear-gradient(rgba(0,100,0,0.6), rgba(0,100,0,0.6)),
            url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        header h1 {
            font-size: 50px;
        }

        nav {
            background-color: #1b5e20;
            text-align: center;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: #a5d6a7;
        }

        section {
            padding: 50px 20px;
            text-align: center;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #1b5e20;
            color: white;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #2e7d32;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

<header>
    <h1>🌿 Naturaleza Viva 🌎</h1>
    <p>Descubre la belleza del planeta Tierra</p>
</header>

<nav>
    <a href="#">Bosques</a>
    <a href="#">Montañas</a>
    <a href="#">Océanos</a>
</nav>

<section>
    <div class="card">
        <h2>La importancia de la naturaleza</h2>
        <p>
            La naturaleza nos brinda aire puro, agua limpia y paisajes increíbles.
            Proteger el medio ambiente es responsabilidad de todos.
        </p>
        <button onclick="mensaje()">Aprende más</button>
    </div>
</section>

<footer>
    <p>© 2026 Naturaleza Viva | Cuidemos el planeta 🌍</p>
</footer>

<script>
    function mensaje() {
        alert("La naturaleza es vida. ¡Cuidémosla juntos! 🌿");
    }
</script>

</body>
</html>
