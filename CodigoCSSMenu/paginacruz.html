<!DOCTYPE html>
<html>
<head>
    <title>solución ejercicio de banderas</title>

<style>
    div {
        width: 300px;
        height: 200px;
        margin: 20px;
        display: inline-block;
        border: 1px solid #000;
        vertical-align: top;
        text-align: center;
        line-height: 200px;
        font-family: sans-serif;
        font-weight: bold;
    }
    
    .colombia { background-image: linear-gradient(yellow 33.3%, blue 33.3%, blue 66.6%, red 66.6%); }
    .francia { background-image: linear-gradient(90deg, blue 33.3%, white 33.3%, white 66.6%, red 66.6%); }
    .italia { background-image: linear-gradient(90deg, green 33.3%, white 33.3%, white 66.6%, red 66.6%); }
    .alemania { background-image: linear-gradient(black 33.3%, red 33.3%, red 66.6%, yellow 66.6%); color: #fff; }
    .japon { background-image: radial-gradient(circle, red 33%, white 34%); }
    .polonia { background-image: linear-gradient(white 50%, red 50%); }
    .espana { background-image: linear-gradient(red 25%, yellow 25%, yellow 75%, red 75%); }
    .argentina { background-image: linear-gradient(#74acdf 33.3%, white 33.3%, white 66.6%, #74acdf 66.6%); }
    .belgica { background-image: linear-gradient(90deg, black 33.3%, yellow 33.3%, yellow 66.6%, red 66.6%); }
    .grecia { background-image: repeating-linear-gradient(#005bae, #005bae 22px, white 22px, white 44px); }

    /* CORRECCIONES AQUÍ */
    .peru {
        background-image: linear-gradient(90deg, red 33.3%, white 33.3%, white 66.6%, red 66.6%);
    }

    .cataluna {
        background-image: repeating-linear-gradient(yellow, yellow 22px, red 22px, red 44px);
    }
</style>

</head>
<body>

    <div class="colombia">colombia</div>
    <div class="francia">francia</div>
    <div class="italia">italia</div>
    <div class="alemania">alemania</div>
    <div class="japon">japón</div>
    <div class="polonia">polonia</div>
    
    <div class="espana">españa</div>
    <div class="argentina">argentina</div>
    <div class="belgica">bélgica</div>
    <div class="grecia">grecia</div>
    <div class="peru">peru</div>
    <div class="cataluna">cataluña</div>

</body>
</html>
