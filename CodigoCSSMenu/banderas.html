<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banderas finales (Guatemala en lugar de México)</title>
  <style>
    body {
      display: flex;
      flex-wrap: wrap;
      gap: 30px 40px;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 30px;
      background: #f0f2f5;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    .flag-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 270px;
    }

    .flag {
      width: 270px;
      height: 180px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      border: 1px solid #555;
      background: #fff;
    }

    .caption {
      margin-top: 14px;
      font-weight: 700;
      color: #1e2b3a;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 1.1rem;
      border-bottom: 2px solid #ccc;
      padding-bottom: 4px;
    }

    /* España - franjas horizontales */
    .espana {
      background: linear-gradient(
        #aa1515 0%,
        #aa1515 25%,
        #f1bf00 25%,
        #f1bf00 75%,
        #aa1515 75%,
        #aa1515 100%
      );
    }

    /* Argentina - celeste y blanco con sol */
    .argentina {
      background: linear-gradient(
        #74acdf 0%,
        #74acdf 33.3%,
        #ffffff 33.3%,
        #ffffff 66.6%,
        #74acdf 66.6%,
        #74acdf 100%
      );
      position: relative;
    }
    .argentina::after {
      content: "☀️";
      position: absolute;
      font-size: 58px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffb612;
      text-shadow: 0 0 6px #b36b00, 0 0 2px #402d00;
      line-height: 1;
    }

    /* Países Bajos - horizontal */
    .holanda {
      background: linear-gradient(
        #ae1c28 0%,
        #ae1c28 33.3%,
        #ffffff 33.3%,
        #ffffff 66.6%,
        #21468b 66.6%,
        #21468b 100%
      );
    }

    /* GUATEMALA - Bandera tricolor vertical con escudo nacional */
    .guatemala {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }
    .guatemala .blue-left {
      background: #4997d0;  /* azul celeste oficial */
      flex: 1;
    }
    .guatemala .white {
      background: #ffffff;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .guatemala .blue-right {
      background: #4997d0;  /* azul celeste oficial */
      flex: 1;
    }

    /* Escudo de Guatemala - Quetzal, pergamino y laureles */
    .guatemala .white .escudo {
      width: 130px;
      height: 130px;
      background: white;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px #a9c4e2, 0 10px 18px #00000066;
      padding: 10px 0;
    }
    
    .guatemala .white .escudo .quetzal {
      font-size: 65px;
      line-height: 1;
      filter: drop-shadow(0 5px 5px #2b7a4b);
      transform: rotate(-5deg);
      margin-bottom: -5px;
    }
    
    .guatemala .white .escudo .pergamino {
      font-size: 40px;
      line-height: 1;
      filter: drop-shadow(0 3px 3px #b8860b);
      transform: rotate(5deg);
      margin: -5px 0;
    }
    
    .guatemala .white .escudo .laureles {
      font-size: 35px;
      line-height: 1;
      filter: drop-shadow(0 3px 3px #2d732d);
      letter-spacing: 10px;
      margin-top: -5px;
    }
    
    .guatemala .white .escudo .fecha {
      font-size: 16px;
      font-weight: bold;
      color: #8b5a2b;
      margin-top: 5px;
      font-family: 'Arial', sans-serif;
    }

    /* CHILE */
    .chile {
      background: white;
      position: relative;
    }
    .chile .blue-canton {
      position: absolute;
      top: 0;
      left: 0;
      width: 90px;
      height: 90px;
      background: #0039a6;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chile .blue-canton::after {
      content: "★";
      color: white;
      font-size: 56px;
      line-height: 1;
      margin-top: -8px;
    }
    .chile .red-stripe {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: #d52b1e;
    }

    /* SUECIA */
    .suecia {
      background: #006aa7;
      position: relative;
    }
    .suecia .cross-v {
      position: absolute;
      width: 34px;
      height: 100%;
      background: #fecc00;
      left: 68px;
      top: 0;
    }
    .suecia .cross-h {
      position: absolute;
      width: 100%;
      height: 34px;
      background: #fecc00;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>

  <!-- ESPAÑA -->
  <div class="flag-card">
    <div class="flag espana"></div>
    <div class="caption">ESPAÑA</div>
  </div>

  <!-- ARGENTINA -->
  <div class="flag-card">
    <div class="flag argentina"></div>
    <div class="caption">ARGENTINA</div>
  </div>

  <!-- PAÍSES BAJOS -->
  <div class="flag-card">
    <div class="flag holanda"></div>
    <div class="caption">PAÍSES BAJOS</div>
  </div>

  <!-- GUATEMALA (reemplaza a México) -->
  <div class="flag-card">
    <div class="flag guatemala">
      <div class="blue-left"></div>
      <div class="white">
        <div class="escudo">
          <span class="quetzal">🦜</span>
          <span class="pergamino">📜</span>
          <span class="laureles">🌿🌿</span>
          <span class="fecha">15·09·1821</span>
        </div>
      </div>
      <div class="blue-right"></div>
    </div>
    <div class="caption">GUATEMALA</div>
  </div>

  <!-- CHILE -->
  <div class="flag-card">
    <div class="flag chile">
      <div class="blue-canton"></div>
      <div class="red-stripe"></div>
    </div>
    <div class="caption">CHILE</div>
  </div>

  <!-- SUECIA -->
  <div class="flag-card">
    <div class="flag suecia">
      <div class="cross-v"></div>
      <div class="cross-h"></div>
    </div>
    <div class="caption">SUECIA</div>
  </div>

</body>
</html>
